services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: EmployeeRegistry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # .NET Backend API
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=EmployeeRegistry;Username=postgres;Password=postgres
      - Jwt__Key=SuperSecretKeyForEmployeeRegistry2026!
      - Jwt__Issuer=EmployeeRegistry
      - Jwt__Audience=EmployeeRegistryApp
    depends_on:
      db:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
